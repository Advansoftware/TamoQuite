name: tamoquite
description: "TamoQuite — cobranças e repasses inteligentes"
publish_to: 'none'

# versionName / versionCode do Android vêm daqui (1.0.0 / 1).
# Cada envio à Play Store precisa de um build number maior: use
# `flutter build appbundle --build-number=N` ou incremente o `+N` abaixo.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Traduções dos widgets do Material (rótulos de diálogo, semântica) em pt-BR.
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado — Riverpod 3 (Notifier/AsyncNotifier, sem code generation
  # para manter o projeto sem etapa de build_runner).
  flutter_riverpod: ^3.3.2

  # Navegação declarativa com redirect centralizado (gate de auth/assinatura).
  go_router: ^17.3.0

  # HTTP com interceptors (injeção do Bearer token e captura do 403
  # SUBSCRIPTION_INACTIVE que a API devolve).
  dio: ^5.10.0

  # Token JWT no Keystore (Android) / Keychain (iOS) — nunca em SharedPreferences.
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.2
  # Fixado em 0.20.2 pelo flutter_localizations do SDK.
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  fonts:
    # Geist Sans — a mesma família usada em apps/web (via pacote `geist`).
    # Os .ttf foram copiados de apps/web/node_modules/geist para garantir
    # correspondência exata com o site, sem depender de download em runtime.
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
