# Configuração do analisador estático. Rode com `flutter analyze`.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Import ou variável sem uso é lixo que vira bug depois — falhe o build.
    unused_import: error
    unused_local_variable: error
    unnecessary_cast: warning

linter:
  rules:
    # ---- Desligadas, com motivo ----

    # Os construtores recebem parâmetros nomeados públicos e atribuem a campos
    # privados (`required ApiClient client` → `_client`). É intencional: um
    # initializing formal exporia o nome com underscore na API pública.
    prefer_initializing_formals: false

    # ---- Ligadas além do flutter_lints ----

    # Widgets const evitam rebuild desnecessário — pesa nas listas do painel.
    prefer_const_constructors: true
    prefer_const_declarations: true

    # BuildContext usado após await é a causa mais comum de crash em async.
    use_build_context_synchronously: true

    # `print` não aparece em release; logging deve ser explícito.
    avoid_print: true
